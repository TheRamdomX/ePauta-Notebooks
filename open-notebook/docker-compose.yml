services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root  
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: always

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "5055:5055"  # REST API only
    environment:
      # This encrypts your API keys in the database
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}

      # Database connection (default values - no need to change)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook

      # Redis cache
      - REDIS_URL=redis://redis:6379

      # Google AI 
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEFAULT_CHAT_MODEL=${DEFAULT_CHAT_MODEL}
      - DEFAULT_EMBEDDING_MODEL=${DEFAULT_EMBEDDING_MODEL}

      # CORS: allow ePAUTA frontend origin
      - EPAUTA_ORIGIN=${CORS_ORIGINS}
    volumes:
      - ./notebook_data:/app/data
      # Mount source code for development (override compiled version)
      - ./open_notebook:/app/open_notebook
      - ./api:/app/api
    depends_on:
      - surrealdb
      - redis
    restart: always
    pull_policy: always
